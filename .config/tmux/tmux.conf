set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set-option -g set-titles on
set-option -g set-titles-string '#S: #W'
set-window-option -g mode-keys vi

# clipboard passthrough (osc 52)
set -g allow-passthrough on
set -g set-clipboard on

# colemak copy mode navigation
bind-key -T copy-mode-vi h send-keys -X cursor-left
bind-key -T copy-mode-vi j send-keys -X cursor-down
bind-key -T copy-mode-vi k send-keys -X cursor-up
bind-key -T copy-mode-vi l send-keys -X cursor-right

# set split keys, splits open in same dir as current
bind-key "'" split-window -v -c '#{pane_current_path}'
bind-key ';' split-window -h -c '#{pane_current_path}'

# switch panes w/ vimkeys
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# resize panes w/ vimkeys
bind-key -T copy-mode-vi C-h resize-pane -L 1
bind-key -T copy-mode-vi C-j resize-pane -D 1
bind-key -T copy-mode-vi C-k resize-pane -U 1
bind-key -T copy-mode-vi C-l resize-pane -R 1

# fast window switching
bind w display-popup -E "tmux list-windows | cut -d ' ' -f 1-2 | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | cut -d \":\" -f 1 | xargs tmux select-window -t"

# use C-a prefix
set-option -g prefix C-a
unbind-key C-a
bind-key C-a send-prefix

# copy-mode
bind a copy-mode

# kill window
bind X kill-window

# 1 > 0
set -g base-index 1
set -g pane-base-index 1

# some good settings
set-option -g renumber-windows on # reindex when closing window
set -s escape-time 0 # fix vi mode delay
set -g history-limit 50000 # increase scrollback buffer size
set -g display-time 4000 # tmux messages are displayed for 4 seconds
setw -g aggressive-resize on # super useful when using "grouped sessions" and multi-monitor setup
set -g focus-events on # neovim likes this
set -g mouse on # enable mouse

# lazygit popup
bind -r g run-shell "if [ \"#{pane_current_path}\" = \"$HOME/.config\" ]; then tmux popup -d '#{pane_current_path}' -E -w 90% -h 90% lazygit --git-dir=$HOME/.local/share/yadm/repo.git --work-tree=$HOME; else tmux popup -d '#{pane_current_path}' -E -w 90% -h 90% lazygit; fi"

# tmux theme
set-option -gq "status" "on"
set-option -gq "status-justify" "left"

set-option -gq "status-left-length" "100"
set-option -gq "status-right-length" "100"
set-option -gq "status-right-attr" "none"

set-option -gq "message-fg" "#c0caf5"
set-option -gq "message-bg" "#1a1b26"

set-option -gq "message-command-fg" "#c0caf5"
set-option -gq "message-command-bg" "#1a1b26"

set-option -gq "status-attr" "none"
set-option -gq "status-left-attr" "none"

set-window-option -gq "window-status-fg" "#1a1b26"
set-window-option -gq "window-status-bg" "#1a1b26"
set-window-option -gq "window-status-attr" "none"

set-window-option -gq "window-status-activity-bg" "#1a1b26"
set-window-option -gq "window-status-activity-fg" "#1a1b26"
set-window-option -gq "window-status-activity-attr" "none"

set-window-option -gq "window-status-separator" ""

set-option -gq "window-style" "fg=#c0caf5"
set-option -gq "window-active-style" "fg=#c0caf5"

set-option -gq "pane-border-style" "fg=#1a1b26"
set-option -gq "pane-active-border-style" "bg=default,fg=#7aa2f7"

set-option -gq "display-panes-active-colour" "#e0af68"
set-option -gq "display-panes-colour" "#7dcfff"

set-option -gq "status-bg" "#1a1b26"
set-option -gq "status-fg" "#c0caf5"

set-option -gq "status-right" "#[fg=#565f89,bg=#1a1b26] devmachine "
set-option -gq "status-left" "#[fg=#1a1b26,bg=#7aa2f7,bold] #S #{prefix_highlight}#[fg=#7aa2f7,bg=#1a1b26,nobold,nounderscore,noitalics]"

set-option -gq "window-status-format" "#[fg=#1a1b26,bg=#1a1b26,nobold,nounderscore,noitalics]#[fg=#c0caf5,bg=#1a1b26] #I  #W #[fg=#1a1b26,bg=#1a1b26,nobold,nounderscore,noitalics]"
set-option -gq "window-status-current-format" "#[fg=#1a1b26,bg=#292e42,nobold,nounderscore,noitalics]#[fg=#c0caf5,bg=#292e42,nobold] #I  #W #[fg=#292e42,bg=#1a1b26,nobold,nounderscore,noitalics]"

set-window-option -g mode-style "bg=#7aa2f7,fg=#1a1b26"
